<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TJ 노래방 연도별 노래 랜덤 뽑기 🎤</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="background-effects">
    <div class="disco-light light1"></div>
    <div class="disco-light light2"></div>
    <div class="disco-light light3"></div>
  </div>

  <div class="layout-wrapper">
    <!-- Left Panel: Main App Container -->
    <main class="app-container">
      <header class="header">
        <div class="badge">TJ KARAOKE RANDOM SELECTOR</div>
        <h1 class="title">🎤 TJ 노래방 <span class="neon-text">랜덤 뽑기</span></h1>
        <p class="subtitle">연도와 월을 고르면 중복 없이 신나게 뽑아드립니다!</p>
      </header>

      <section class="control-panel">
        <!-- 1. Year Range Select (Restored as per request) -->
        <div class="control-group">
          <label>📅 연도 범위 지정</label>
          <div class="range-select-container">
            <div class="select-wrapper">
              <select id="startYearSelect">
                <!-- JS 동적 생성 -->
              </select>
            </div>
            <span class="range-separator">~</span>
            <div class="select-wrapper">
              <select id="endYearSelect">
                <!-- JS 동적 생성 -->
              </select>
            </div>
          </div>

          <!-- Quick Preset Buttons -->
          <div class="preset-buttons">
            <button class="preset-btn active" data-start="1980" data-end="2026">전체</button>
            <button class="preset-btn" data-start="1980" data-end="1989">80년대</button>
            <button class="preset-btn" data-start="1990" data-end="1999">90년대</button>
            <button class="preset-btn" data-start="2000" data-end="2009">00년대</button>
            <button class="preset-btn" data-start="2010" data-end="2019">10년대</button>
            <button class="preset-btn" data-start="2020" data-end="2026">20년대~</button>
          </div>
        </div>

        <!-- 2. Month Multi-Select -->
        <div class="control-group">
          <div class="group-header">
            <label>🗓️ 월 선택 (중복 가능)</label>
            <button type="button" class="select-all-btn" data-target="month-chip">전체 선택</button>
          </div>
          <div class="chip-group grid-months" id="monthChipGroup">
            <label class="checkbox-chip"><input type="checkbox" name="month-chip" value="1" checked><span>1월</span></label>
            <label class="checkbox-chip"><input type="checkbox" name="month-chip" value="2" checked><span>2월</span></label>
            <label class="checkbox-chip"><input type="checkbox" name="month-chip" value="3" checked><span>3월</span></label>
            <label class="checkbox-chip"><input type="checkbox" name="month-chip" value="4" checked><span>4월</span></label>
            <label class="checkbox-chip"><input type="checkbox" name="month-chip" value="5" checked><span>5월</span></label>
            <label class="checkbox-chip"><input type="checkbox" name="month-chip" value="6" checked><span>6월</span></label>
            <label class="checkbox-chip"><input type="checkbox" name="month-chip" value="7" checked><span>7월</span></label>
            <label class="checkbox-chip"><input type="checkbox" name="month-chip" value="8" checked><span>8월</span></label>
            <label class="checkbox-chip"><input type="checkbox" name="month-chip" value="9" checked><span>9월</span></label>
            <label class="checkbox-chip"><input type="checkbox" name="month-chip" value="10" checked><span>10월</span></label>
            <label class="checkbox-chip"><input type="checkbox" name="month-chip" value="11" checked><span>11월</span></label>
            <label class="checkbox-chip"><input type="checkbox" name="month-chip" value="12" checked><span>12월</span></label>
          </div>
        </div>

        <!-- 3. Artist Gender Multi-Select -->
        <div class="control-group">
          <div class="group-header">
            <label>👤 가수 성별 선택 (중복 가능)</label>
            <button type="button" class="select-all-btn" data-target="gender-chip">전체 선택</button>
          </div>
          <div class="chip-group" id="genderChipGroup">
            <label class="checkbox-chip">
              <input type="checkbox" name="gender-chip" value="남성" checked>
              <span>👨 남성 (남자키)</span>
            </label>
            <label class="checkbox-chip">
              <input type="checkbox" name="gender-chip" value="여성" checked>
              <span>👩 여성 (여자키)</span>
            </label>
            <label class="checkbox-chip">
              <input type="checkbox" name="gender-chip" value="혼성" checked>
              <span>👫 혼성 / 듀엣</span>
            </label>
          </div>
        </div>

        <!-- 4. Genre Multi-Select -->
        <div class="control-group">
          <div class="group-header">
            <label>🎶 장르 선택 (중복 가능)</label>
            <button type="button" class="select-all-btn" data-target="genre-chip">전체 선택</button>
          </div>
          <div class="chip-group" id="genreChipGroup">
            <label class="checkbox-chip">
              <input type="checkbox" name="genre-chip" value="댄스" checked>
              <span>🕺 댄스</span>
            </label>
            <label class="checkbox-chip">
              <input type="checkbox" name="genre-chip" value="발라드" checked>
              <span>💧 발라드</span>
            </label>
            <label class="checkbox-chip">
              <input type="checkbox" name="genre-chip" value="힙합" checked>
              <span>🎧 힙합</span>
            </label>
            <label class="checkbox-chip">
              <input type="checkbox" name="genre-chip" value="록/밴드" checked>
              <span>🎸 록/밴드</span>
            </label>
            <label class="checkbox-chip">
              <input type="checkbox" name="genre-chip" value="트로트" checked>
              <span>🎺 트로트</span>
            </label>
          </div>
        </div>

        <button id="pickBtn" class="pick-btn">
          <span class="btn-glow"></span>
          <span class="btn-text">🎲 조건 맞춤 노래 뽑기!</span>
        </button>
      </section>

      <!-- Slot Machine / Countdown Display -->
      <section id="slotSection" class="slot-section hidden">
        <div class="slot-container">
          <div class="slot-label">추천 진행 중... (중복 제외 검사 중)</div>
          <div id="slotDisplay" class="slot-display">???</div>
        </div>
      </section>

      <!-- Result Card -->
      <section id="resultCard" class="result-card hidden">
        <div class="card-header">
          <span class="year-badge" id="resYear">2020년</span>
          <span class="genre-badge" id="resGenre">댄스</span>
          <span class="gender-badge" id="resGender">👨 남성</span>
        </div>

        <div class="tj-number-box">
          <span class="tj-label">TJ 노래 번호</span>
          <div class="tj-number-wrapper">
            <span id="resTjNum" class="tj-number">87391</span>
            <button id="copyBtn" class="copy-btn" title="번호 복사">📋 복사</button>
          </div>
        </div>

        <div class="song-info">
          <h2 id="resTitle" class="song-title">Dynamite</h2>
          <p id="resArtist" class="song-artist">방탄소년단 (BTS)</p>
        </div>

        <div class="action-buttons">
          <a id="ytLink" href="#" target="_blank" rel="noopener noreferrer" class="action-btn yt-btn">
            ▶️ YouTube 검색
          </a>
          <button id="rePickBtn" class="action-btn repick-btn">
            🔄 다시 뽑기
          </button>
        </div>
      </section>

      <footer class="footer">
        <p>TJ 노래방에 있는 대표 인기곡들을 선별하여 제공합니다 🎤✨</p>
      </footer>
    </main>

    <!-- Right Panel: Played Songs History -->
    <aside class="history-panel">
      <div class="history-header">
        <h2>🎵 불렀던 곡 리스트 (<span id="historyCount">0</span>곡)</h2>
        <button id="clearHistoryBtn" class="clear-history-btn">🗑️ 전체 삭제</button>
      </div>

      <div id="historyList" class="history-list">
        <div class="empty-history">
          <p>🎤 아직 뽑은 노래가 없습니다.</p>
          <span>노래를 뽑으면 중복되지 않도록 이곳에 저장됩니다!</span>
        </div>
      </div>
    </aside>
  </div>

  <script src="songData.js"></script>
  <script src="app.js"></script>
</body>
</html>
